{% extends 'albums/base.html' %}

{% block content %}
<div class="max-w-md mx-auto my-16">
    <a href="{% url 'album-list' %}" class="inline-flex items-center space-x-2 text-sm text-[#bf953f] hover:text-white font-bold uppercase tracking-widest transition mb-6 group">
        <svg class="w-4 h-4 transform group-hover:-translate-x-0.5 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        <span>Return to Arena</span>
    </a>

    <div class="bg-[#0d121b] border-2 border-red-600 shadow-[0_0_20px_rgba(220,38,38,0.2)]">
        
        <div class="border-b-2 border-red-600 px-8 py-8 text-center bg-red-900/10">
            <h2 class="text-2xl font-black uppercase tracking-tighter text-white flex items-center justify-center space-x-3">
                <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                </svg>
                <span>Caution</span>
            </h2>
        </div>

        <div class="p-8 space-y-8">
            <p class="text-xs text-gray-300 leading-relaxed uppercase tracking-widest font-medium">
                Confirm termination of <strong class="text-white">"{{ object.title }}"</strong>? This action will permanently erase the asset from the system registry. This cannot be undone.
            </p>

            <form method="post" class="flex flex-col gap-4">
                {% csrf_token %}
                <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white text-xs font-black py-4 uppercase tracking-widest transition-all">
                    Yes, Delete Asset
                </button>
                <a href="{% url 'album-list' %}" class="w-full text-center border-2 border-[#bf953f] text-[#bf953f] hover:bg-[#bf953f] hover:text-black text-xs font-black py-4 uppercase tracking-widest transition-all">
                    Keep Album
                </a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
