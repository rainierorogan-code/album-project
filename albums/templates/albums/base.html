<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYTHIC Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Oswald', sans-serif; }
        .ml-gold-gradient { background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); }
        .ml-border { border-image: linear-gradient(to bottom, #bf953f, #aa771c) 1; }
    </style>
</head>
<body class="bg-[#0a0e14] text-white min-h-screen">

<header class="sticky top-0 z-50 border-b-4 border-[#bf953f] bg-[#0d121b] shadow-2xl">
        <div class="max-w-7xl mx-auto px-6 py-6 flex items-center justify-between w-full">
            
            <a href="/" class="text-3xl font-bold tracking-widest uppercase text-transparent bg-clip-text ml-gold-gradient">
                MYTHIC GALLERY <span class="text-white text-xl">x MLBB</span>
            </a>

            <nav class="flex items-center gap-6">
                {% if user.is_authenticated %}
                    <div class="bg-[#1b2432] border border-[#bf953f] px-4 py-1 text-xs uppercase font-bold text-[#fcf6ba]">
                        {{ user.username }}
                    </div>
                    <form action="{% url 'logout' %}" method="post">
                        {% csrf_token %}
                        <button class="bg-red-900 border border-red-500 text-white px-4 py-1 text-xs font-bold uppercase hover:bg-red-700 transition">Logout</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}" class="bg-[#bf953f] text-black px-6 py-2 font-bold uppercase tracking-widest hover:scale-105 transition-transform">Login</a>
                {% endif %}
            </nav>
            
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-12">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="text-center py-10 text-[#bf953f] text-[10px] uppercase tracking-widest border-t border-[#1b2432]">
        © 2026 Snapshot MLBB Edition — Arena Awaits
    </footer>

</body>
</html>
