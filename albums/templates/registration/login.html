{% extends 'albums/base.html' %}

{% block content %}
<div class="max-w-md mx-auto my-16 space-y-6">
    <div class="bg-[#0d121b] border-2 border-[#bf953f] shadow-[0_0_20px_rgba(191,149,63,0.2)]">
        
        <div class="border-b-2 border-[#bf953f] px-8 py-8 text-center bg-[#1b2432]/50">
            <h2 class="text-2xl font-black uppercase tracking-tighter text-white">Enter Arena</h2>
            <p class="text-[10px] font-bold uppercase tracking-widest text-[#bf953f] mt-2">Authenticate your account access.</p>
        </div>

        <form method="post" class="p-8 space-y-8">
            {% csrf_token %}
            
            {% if form.errors %}
                <div class="border-2 border-red-500 bg-red-900/20 text-red-500 px-4 py-3 text-[10px] font-bold uppercase tracking-widest">
                    Invalid credentials. Check your battle logs and retry.
                </div>
            {% endif %}

            <div class="space-y-6 form-ml-styles">
                {{ form.as_p }}
            </div>

            <div class="pt-4">
                <button type="submit" class="w-full bg-[#bf953f] hover:bg-[#d4af37] text-black text-xs font-black py-4 uppercase tracking-widest transition-all">
                    Authorize Entry
                </button>
                <p class="text-[10px] font-bold text-center uppercase tracking-widest text-gray-400 mt-8">
                    Need an account? <a href="{% url 'signup' %}" class="underline text-white">Sign up here</a>.
                </p>
            </div>
        </form>
    </div>
</div>

<style>
    .form-ml-styles p {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
    }
    .form-ml-styles label {
        font-size: 10px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        color: #bf953f;
    }
    .form-ml-styles input {
        width: 100%;
        padding: 1rem;
        font-size: 1rem;
        background-color: #0a0e14;
        border: 2px solid #bf953f;
        color: white;
        outline: none;
    }
    .form-ml-styles input:focus {
        background-color: #1b2432;
        box-shadow: 4px 4px 0px 0px #bf953f;
    }
</style>
{% endblock %}
